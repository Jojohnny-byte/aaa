<body>
    <h1>Elementos de Formulário</h1>
    <p> Os elementos de formulario e, HTML, permitem coletar dados do usuario (como login, cadantro, pesquis, ETC)</p>

    <form action="" method="">
    <fieldset>
        <legend>Contato</legend>
    

    <ladel for="nome"> Nome :</ladel>
    <imput id="nome" name="nome" type="text" requered><br>
        <ladel for="email"> Email :</ladel>
    <imput id="email" email="email" type="email" requered><br>
          <ladel for="senha"> Senha :</ladel>
    <imput id="senha" password="senha" type="password" requered><br>
        <button type="submit">Enviar</button>
</fieldset>
    </form>

</body>
</html>
